name = "alleditor"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "d556c524bda75cc7c5b5f13b6433ede7"

# ⚠️ [placement] 절대 추가 금지!
# wrangler deploy 시 대시보드 Region 설정이 덮어씌워짐
# Region은 Cloudflare 대시보드에서 수동 설정 (GCP US)

[[kv_namespaces]]
binding = "SESSIONS"
id = "2892f3a4de90429dbcf0eb272578009e"   # editor-session

# Cron Trigger — 휴지통 30일 경과 프로젝트 영구 삭제
# 매일 18:00 UTC = 03:00 KST. scheduled() 핸들러가 purgeExpiredTrash() 호출.
[triggers]
crons = ["0 18 * * *"]

# Secrets (wrangler secret put 으로 설정):
# - OPENAI_API_KEY
# - GEMINI_API_KEY
