name = "alleditor"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "d556c524bda75cc7c5b5f13b6433ede7"

# ⚠️ [placement] 절대 추가 금지!
# wrangler deploy 시 대시보드 Region 설정이 덮어씌워짐
# Region은 Cloudflare 대시보드에서 수동 설정 (GCP US)

[[kv_namespaces]]
binding = "SESSIONS"
id = "2892f3a4de90429dbcf0eb272578009e"   # editor-session

# Cron Trigger 없음 — 영구 삭제는 자동화하지 않음.
# 관리자가 주기적으로 /projects/trash 확인 후 /projects/trash/purge 로 일괄 처리.
# KV 용량 소진까지 여유 충분하다는 판단.

